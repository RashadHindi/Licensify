<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank | Licensify Admin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/admin.css">
</head>
<body class="admin-body">
    
    <div id="sidebar-container"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="admin-main">
        <!-- Topbar -->
        <header class="admin-topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="m-0 fw-bold heading-font text-dark-green">Question Bank</h4>
            </div>
            
            <div class="topbar-right d-flex align-items-center gap-3">
                <div id="admin-user-info"></div>
            </div>
        </header>

        <!-- Content -->
        <div class="admin-content">
            <div class="admin-card">
                <div class="admin-card-header flex-column flex-md-row align-items-start align-items-md-center gap-3">
                    <h5 class="admin-card-title" id="question-list-title">All Questions</h5>
                    <div class="d-flex gap-2 w-100 w-md-auto">
                        <select id="exam-filter" class="form-select form-select-sm rounded-pill px-3" style="width: 200px;">
                            <option value="all">All Exams</option>
                            <!-- Dynamic exams -->
                        </select>
                        <button class="btn btn-sm btn-dark-green rounded-pill px-3 text-white" id="add-question-btn">
                            <i class="bi bi-plus-lg me-1"></i> Add Question
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th style="width: 50px;">ID</th>
                                <th>Question Details</th>
                                <th>Correct Answer</th>
                                <th>Exams</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="questions-table-body">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Question Modal -->
    <div class="modal fade" id="questionModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold text-dark-green" id="questionModalTitle">Add New Question</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="question-form">
                        <input type="hidden" id="q-id">
                        <div class="mb-3">
                            <label class="form-label smaller fw-bold text-muted">Question Text</label>
                            <textarea id="q-text" class="form-control rounded-3" rows="2" placeholder="Enter the question here..." required></textarea>
                        </div>
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label smaller fw-bold text-muted">Option A</label>
                                <input type="text" id="q-opt-a" class="form-control rounded-3" placeholder="Option A" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label smaller fw-bold text-muted">Option B</label>
                                <input type="text" id="q-opt-b" class="form-control rounded-3" placeholder="Option B" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label smaller fw-bold text-muted">Option C</label>
                                <input type="text" id="q-opt-c" class="form-control rounded-3" placeholder="Option C" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label smaller fw-bold text-muted">Option D</label>
                                <input type="text" id="q-opt-d" class="form-control rounded-3" placeholder="Option D" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label smaller fw-bold text-muted">Correct Answer</label>
                                <select id="q-correct" class="form-select rounded-3">
                                    <option value="A">Option A</option>
                                    <option value="B">Option B</option>
                                    <option value="C">Option C</option>
                                    <option value="D">Option D</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label smaller fw-bold text-muted">Traffic Sign Image (Optional)</label>
                                <input type="text" id="q-image" class="form-control rounded-3" placeholder="Image URL (e.g. stop-sign.png)">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label smaller fw-bold text-muted">Assign to Exams</label>
                            <div class="row g-2" id="exam-checkboxes">
                                <!-- Dynamic checkboxes -->
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark-green w-100 rounded-pill py-3 fw-bold text-white shadow-sm">Save Question</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pages/admin/common.js"></script>
    <script src="../js/pages/admin/questions.js"></script>
</body>
</html>
