<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Exams | Licensify Admin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/admin.css">
</head>
<body class="admin-body">
    
    <div id="sidebar-container"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="admin-main">
        <!-- Topbar -->
        <header class="admin-topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="m-0 fw-bold heading-font text-dark-green">Mock Exams</h4>
            </div>
            
            <div class="topbar-right d-flex align-items-center gap-3">
                <div id="admin-user-info"></div>
            </div>
        </header>

        <!-- Content -->
        <div class="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold text-dark-green m-0 heading-font">Available Exams</h5>
                <button class="btn btn-dark-green rounded-pill px-4 py-2 fw-bold text-white shadow-sm" id="create-exam-btn">
                    <i class="bi bi-plus-lg me-2"></i> Create New Exam
                </button>
            </div>

            <div class="row g-4" id="exams-grid">
                <!-- Dynamic grid -->
            </div>
        </div>
    </main>

    <!-- Create/Edit Exam Modal -->
    <div class="modal fade" id="examModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold text-dark-green" id="examModalTitle">Create New Mock Exam</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="exam-form">
                        <input type="hidden" id="exam-id">
                        <div class="mb-3">
                            <label class="form-label smaller fw-bold text-muted">Exam Title</label>
                            <input type="text" id="exam-title" class="form-control rounded-3 py-2" placeholder="e.g. Traffic Rules Advanced" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label smaller fw-bold text-muted">Duration (min)</label>
                                <input type="number" id="exam-duration" class="form-control rounded-3 py-2" value="30" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label smaller fw-bold text-muted">Question Limit</label>
                                <input type="number" id="exam-limit" class="form-control rounded-3 py-2" value="30" max="30" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label smaller fw-bold text-muted">Description</label>
                            <textarea id="exam-desc" class="form-control rounded-3" rows="3" placeholder="Brief description of the exam..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-dark-green w-100 rounded-pill py-3 fw-bold text-white shadow-sm">Save Exam</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/pages/admin/common.js"></script>
    <script src="../js/pages/admin/exams.js"></script>
</body>
</html>
