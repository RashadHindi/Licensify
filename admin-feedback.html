<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Reports | Licensify Admin</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link href="css/main.css" rel="stylesheet">
    <link href="css/pages/dashboard.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-off-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-scrolled shadow-sm">
        <div class="container-fluid px-4 px-lg-5 py-2">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="images/Licensify-Logo2.png" class="logo-icon" alt="Licensify">
                <span class="fw-bold fs-4 heading-font text-dark-green">Licensify</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <i class="bi bi-list fs-1 text-dark-green"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1 gap-lg-4 fs-6 fw-medium text-uppercase text-tracking">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="study.html">Study</a></li>
                    <li class="nav-item"><a class="nav-link" href="exams.html">Practice Test</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservation.html">Book Lessons</a></li>
                </ul>
                <div class="navbar-auth-user-wrapper mt-3 mt-lg-0"></div>
            </div>
        </div>
    </nav>

    <!-- Admin Content -->
    <main class="py-6 mt-5">
        <div class="container">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div id="sidebar-container"></div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9 animate-fade">
                    <!-- Stats Overview -->
                    <div class="row g-4 mb-4 fade-up-element visible">
                        <div class="col-md-4">
                            <div class="card border-0 shadow-sm rounded-4 p-4 h-100 stats-card">
                                <div class="d-flex align-items-center gap-3 mb-3">
                                    <div class="icon-box bg-light-green text-warning rounded-3 p-2">
                                        <i class="bi bi-star-fill fs-4"></i>
                                    </div>
                                    <span class="fw-bold text-muted small text-uppercase">Average Rating</span>
                                </div>
                                <div class="d-flex align-items-end gap-2">
                                    <h3 class="fw-bold text-dark-green mb-0" id="avg-rating">0.0</h3>
                                    <span class="text-muted smaller mb-1">/ 5.0</span>
                                </div>
                                <div id="avg-stars" class="mt-2 text-warning fs-5"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card border-0 shadow-sm rounded-4 p-4 h-100 stats-card">
                                <div class="d-flex align-items-center gap-3 mb-3">
                                    <div class="icon-box bg-light-green text-dark-green rounded-3 p-2">
                                        <i class="bi bi-chat-left-dots fs-4"></i>
                                    </div>
                                    <span class="fw-bold text-muted small text-uppercase">Total Reviews</span>
                                </div>
                                <h3 class="fw-bold text-dark-green mb-1" id="total-reviews">0</h3>
                                <p class="text-muted smaller mb-0">Across all categories</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card border-0 shadow-sm rounded-4 p-4 h-100 stats-card">
                                <div class="d-flex align-items-center gap-3 mb-3">
                                    <div class="icon-box bg-light-red text-danger rounded-3 p-2" style="background-color: #fff5f5;">
                                        <i class="bi bi-exclamation-triangle fs-4"></i>
                                    </div>
                                    <span class="fw-bold text-muted small text-uppercase">Critical Alerts</span>
                                </div>
                                <h3 class="fw-bold text-danger mb-1" id="critical-alerts">0</h3>
                                <p class="text-muted smaller mb-0">Unresolved 1-2 star reviews</p>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-12">
                            <div class="card border-0 shadow-sm rounded-4 p-4">
                                <h5 class="fw-bold text-dark-green heading-font mb-4">Rating Distribution</h5>
                                <div style="height: 250px;">
                                    <canvas id="ratingChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-header bg-white border-0 py-4 px-4 d-flex justify-content-between align-items-center">
                            <h4 class="fw-bold text-dark-green heading-font mb-0">Detailed Feedback</h4>
                            <select id="trainer-feedback-filter" class="form-select form-select-sm rounded-pill px-3" style="width: 180px;">
                                <option value="all">All Trainers</option>
                            </select>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="border-0 px-4 smaller text-uppercase">Student</th>
                                            <th class="border-0 px-4 smaller text-uppercase">Trainer</th>
                                            <th class="border-0 px-4 smaller text-uppercase">Rating</th>
                                            <th class="border-0 px-4 smaller text-uppercase">Comment</th>
                                        </tr>
                                    </thead>
                                    <tbody id="feedback-table-body">
                                        <!-- Dynamic -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/common.js"></script>
    <script src="js/pages/admin/common.js"></script>
    <script src="js/pages/admin/feedback.js?v=2"></script>
</body>
</html>
