<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule | Licensify Trainer</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link href="css/main.css" rel="stylesheet">
    <link href="css/pages/dashboard.css" rel="stylesheet">
</head>
<body class="bg-off-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-scrolled shadow-sm">
        <div class="container-fluid px-4 px-lg-5 py-2">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="images/Licensify-Logo2.png" class="logo-icon" alt="Licensify">
                <span class="fw-bold fs-4 heading-font text-dark-green">Licensify</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <i class="bi bi-list fs-1 text-dark-green"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1 gap-lg-4 fs-6 fw-medium text-uppercase text-tracking">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="study.html">Study</a></li>
                    <li class="nav-item"><a class="nav-link" href="exams.html">Practice Test</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservation.html">Book Lessons</a></li>
                </ul>
                <div class="navbar-auth-user-wrapper mt-3 mt-lg-0"></div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="py-6 mt-5">
        <div class="container">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div id="trainer-sidebar-container">
                        <div class="card border-0 shadow-sm rounded-4 p-3 portal-sidebar">
                            <div class="nav flex-column gap-2">
                                <a href="trainer-dashboard.html" class="portal-nav-link">
                                    <i class="bi bi-speedometer2"></i> Dashboard
                                </a>
                                <a href="trainer-schedule.html" class="portal-nav-link active">
                                    <i class="bi bi-calendar4-week"></i> My Schedule
                                </a>
                                <a href="trainer-students.html" class="portal-nav-link">
                                    <i class="bi bi-people"></i> My Students
                                </a>
                                <a href="trainer-settings.html" class="portal-nav-link">
                                    <i class="bi bi-gear"></i> Settings
                                </a>
                                <hr class="my-3 mx-3 opacity-10">
                                <a href="#" id="sidebar-logout-btn" class="portal-nav-link text-danger">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9 animate-fade">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4">
                        <div class="card-header bg-white border-0 py-4 px-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                            <div>
                                <h4 class="fw-bold text-dark-green heading-font mb-1">Daily Agenda Management</h4>
                                <p class="text-muted small mb-0">Manage your hourly availability and view reservations.</p>
                            </div>
                            <div class="d-flex gap-2">
                                <button id="mark-day-off-btn" class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold">Set Day Off</button>
                                <input type="date" id="agenda-date-picker" class="form-control form-control-sm rounded-pill px-3" style="width: 150px;">
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="border-0 px-4 smaller text-uppercase" style="width: 150px;">Time</th>
                                            <th class="border-0 px-4 smaller text-uppercase">Student / Availability</th>
                                            <th class="border-0 px-4 smaller text-uppercase text-end">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="hourly-agenda-table">
                                        <!-- Dynamic Hourly Slots -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden text-center">
                <div class="modal-body p-5">
                    <div class="icon-box bg-light-orange text-orange rounded-circle mx-auto mb-4 d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; background-color: #fffaf0;">
                        <i class="bi bi-exclamation-triangle fs-1 text-orange"></i>
                    </div>
                    <h4 class="fw-bold text-dark-green heading-font mb-2" id="confirmModalTitle">Are you sure?</h4>
                    <p class="text-muted mb-4 small" id="confirmModalMessage">Do you want to proceed with this action?</p>
                    <div class="d-flex flex-column gap-2">
                        <button type="button" class="btn btn-dark-green rounded-pill px-4 py-2 fw-bold text-white shadow-sm" id="confirmModalActionBtn">Confirm</button>
                        <button type="button" class="btn btn-light rounded-pill px-4 py-2 fw-bold" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/common.js"></script>
    <script src="js/pages/trainer/schedule.js"></script>
</body>
</html>
